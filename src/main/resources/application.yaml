spring:
  application:
    name: aegis-app

  datasource:
    url: jdbc:postgresql://localhost:5432/aegis
    username: aegis_user
    password: aegis_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    user:
      name: admin
      password: admin
      # Temporary — disables Spring Security's auto-generated password
      # We will replace this with proper JWT in Sprint 3

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.aegis: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG